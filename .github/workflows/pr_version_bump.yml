name: PR Version Bump

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Check and bump version
        run: |
          # Fetch the base branch to compare against
          git fetch origin ${{ github.base_ref }}

          OLD_VERSION=$(git show origin/${{ github.base_ref }}:VERSION)
          NEW_VERSION=$(cat VERSION)

          if [ "$(printf '%s\n' "$OLD_VERSION" "$NEW_VERSION" | sort -V | head -n1)" = "$OLD_VERSION" ] && [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Version has correctly been increased from $OLD_VERSION to $NEW_VERSION."
          else
            echo "Version $NEW_VERSION is not strictly greater than base version $OLD_VERSION. Bumping version..."

            # Bump patch version without creating a git tag
            IFS='.' read -r major minor patch <<< "$OLD_VERSION"
            echo "$major.$minor.$((patch + 1))" > VERSION
            # Configure git user using the last non-merge commit's author
            git config user.name "$(git log -1 --no-merges --pretty=format:'%an')"
            git config user.email "$(git log -1 --no-merges --pretty=format:'%ae')"

            # Commit the change
            git add VERSION
            git commit -m "Bump version"

            # Push changes back to the PR branch
            git push origin HEAD:${{ github.head_ref }}
          fi
